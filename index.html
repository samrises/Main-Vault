<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Requirement Entry Form</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --pink:#d6336c; --pink-soft:#f3a5c0; --pink-bg:#fff5f8;
    --ink:#2b2b2b; --muted:#9a8a90; --line:#f0d9e2;
    --card:#ffffff; --ok:#2f9e6e; --danger:#e03131;
  }
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Jost',sans-serif;}
  body{
    background:radial-gradient(circle at 20% 0%,#ffe9f1 0%,var(--pink-bg) 45%,#fdeef4 100%);
    min-height:100vh;color:var(--ink);padding:24px 16px;
  }
  .wrap{max-width:640px;margin:0 auto;}
  .card{
    background:var(--card);border-radius:20px;padding:30px 26px;
    box-shadow:0 18px 50px -22px rgba(214,51,108,.35);border:1px solid var(--line);
  }
  .head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
  h1{font-size:1.55rem;font-weight:600;letter-spacing:-.3px;color:var(--pink);}
  .sub{color:var(--muted);font-size:.85rem;margin-bottom:22px;font-weight:400;}
  .oid{
    background:linear-gradient(135deg,var(--pink),#b02a5b);color:#fff;
    padding:6px 14px;border-radius:30px;font-weight:600;font-size:.82rem;
    letter-spacing:.5px;white-space:nowrap;
  }
  label{display:block;font-size:.8rem;font-weight:500;color:var(--ink);margin:0 0 7px 2px;}
  input,textarea{
    width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:12px;
    font-size:.95rem;background:#fffafc;transition:.18s;color:var(--ink);
  }
  input:focus,textarea:focus{outline:none;border-color:var(--pink-soft);background:#fff;box-shadow:0 0 0 4px rgba(243,165,192,.25);}
  .field{margin-bottom:20px;}
  textarea{resize:vertical;min-height:70px;}

  .items-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .items-head label{margin:0;font-size:.9rem;font-weight:600;color:var(--pink);}
  .item-row{display:flex;gap:10px;margin-bottom:10px;align-items:center;}
  .item-row .name{flex:1;}
  .item-row .qty{width:88px;text-align:center;}
  .del{
    width:38px;height:42px;border:none;border-radius:10px;background:#ffe3ea;color:var(--danger);
    font-size:1.2rem;cursor:pointer;flex-shrink:0;transition:.15s;line-height:1;
  }
  .del:hover{background:#ffd0db;}
  .add{
    width:100%;padding:11px;border:1.5px dashed var(--pink-soft);background:#fff5f8;color:var(--pink);
    border-radius:12px;font-weight:500;font-size:.9rem;cursor:pointer;margin-top:4px;transition:.15s;
  }
  .add:hover{background:#ffe9f1;}

  .submit{
    width:100%;margin-top:26px;padding:15px;border:none;border-radius:14px;
    background:linear-gradient(135deg,var(--pink),#b02a5b);color:#fff;font-size:1rem;
    font-weight:600;letter-spacing:.4px;cursor:pointer;transition:.18s;
    box-shadow:0 10px 24px -10px rgba(214,51,108,.6);
  }
  .submit:hover{transform:translateY(-2px);box-shadow:0 14px 30px -10px rgba(214,51,108,.7);}
  .submit:active{transform:translateY(0);}

  .toast{
    margin-top:18px;padding:14px 16px;border-radius:12px;background:#eafaf2;border:1px solid #bfe9d4;
    color:var(--ok);font-size:.88rem;font-weight:500;display:none;
  }
  .toast.show{display:block;animation:pop .3s ease;}
  @keyframes pop{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  pre.out{
    margin-top:14px;background:#2b2b2b;color:#ffd6e6;padding:14px;border-radius:12px;
    font-size:.8rem;white-space:pre-wrap;display:none;font-family:'Jost',monospace;
  }
  pre.out.show{display:block;}
  .foot{text-align:center;margin-top:18px;font-size:.72rem;color:var(--muted);}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="head">
      <h1>Requirement Entry</h1>
      <span class="oid" id="orderId">REQ-0000</span>
    </div>
    <p class="sub">Fill the requirement details below</p>

    <div class="field">
      <label>Requirement Receiver Name</label>
      <input type="text" id="receiver" placeholder="e.g. Somnath Karmakar" autocomplete="off">
    </div>

    <div class="field">
      <div class="items-head">
        <label>Items</label>
      </div>
      <div id="itemList"></div>
      <button class="add" id="addItem" type="button">+ Add Item</button>
    </div>

    <div class="field">
      <label>Remarks</label>
      <textarea id="remarks" placeholder="Any notes / urgency / specifications..."></textarea>
    </div>

    <button class="submit" id="submitBtn" type="button">Submit Requirement</button>

    <div class="toast" id="toast"></div>
    <pre class="out" id="out"></pre>
  </div>
  <p class="foot">Built by Somnath Karmakar</p>
</div>

<script>
  // ---- Paste your GAS Web App URL here (ends with /exec) ----
  const GAS_URL = 'PASTE_YOUR_WEB_APP_URL_HERE';

  // ---- Auto Order ID (serial-wise, persists in browser) ----
  const KEY = 'req_last_serial';
  function nextOrderId(){
    let last = parseInt(localStorage.getItem(KEY) || '0', 10);
    return 'REQ-' + String(last + 1).padStart(4, '0');
  }
  let currentId = nextOrderId();
  document.getElementById('orderId').textContent = currentId;

  // ---- Dynamic item rows ----
  const itemList = document.getElementById('itemList');
  function addRow(name = '', qty = ''){
    const row = document.createElement('div');
    row.className = 'item-row';
    row.innerHTML = `
      <input class="name" type="text" placeholder="Item name" value="${name}" autocomplete="off">
      <input class="qty" type="number" min="1" placeholder="Qty" value="${qty}">
      <button class="del" type="button" title="Remove">&times;</button>`;
    row.querySelector('.del').onclick = () => {
      if(itemList.children.length > 1) row.remove();
      else { row.querySelector('.name').value=''; row.querySelector('.qty').value=''; }
    };
    itemList.appendChild(row);
  }
  addRow(); // start with 1 row
  document.getElementById('addItem').onclick = () => addRow();

  // ---- Submit ----
  document.getElementById('submitBtn').onclick = () => {
    const receiver = document.getElementById('receiver').value.trim();
    const remarks = document.getElementById('remarks').value.trim();
    const items = [...itemList.querySelectorAll('.item-row')]
      .map(r => ({ name: r.querySelector('.name').value.trim(), qty: r.querySelector('.qty').value.trim() }))
      .filter(i => i.name !== '');

    if(!receiver){ alert('Receiver name daalo'); return; }
    if(items.length === 0){ alert('Kam se kam 1 item daalo'); return; }

    const payload = {
      orderId: currentId,
      receiver,
      items,
      remarks,
      timestamp: new Date().toLocaleString('en-IN')
    };

    // bump serial only on successful submit
    localStorage.setItem(KEY, parseInt(currentId.split('-')[1], 10));

    const toast = document.getElementById('toast');
    const out = document.getElementById('out');
    const btn = document.getElementById('submitBtn');

    // show what we're sending
    out.textContent = JSON.stringify(payload, null, 2);
    out.classList.add('show');
    toast.textContent = 'Sending...';
    toast.classList.add('show');
    btn.disabled = true;

    // 👉 send to Google Sheets via GAS web app
    fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // text/plain avoids CORS preflight
      body: JSON.stringify(payload)
    })
    .then(r => r.json())
    .then(res => {
      if (res.ok) {
        toast.style.color = '#2f9e6e';
        toast.textContent = `✓ Saved to Sheet — ${payload.orderId} (${res.rows} item${res.rows>1?'s':''})`;
        // reset for next entry
        document.getElementById('receiver').value = '';
        document.getElementById('remarks').value = '';
        itemList.innerHTML = '';
        addRow();
        currentId = nextOrderId();
        document.getElementById('orderId').textContent = currentId;
      } else {
        toast.style.color = '#e03131';
        toast.textContent = '✕ Error: ' + (res.error || 'unknown');
      }
    })
    .catch(err => {
      toast.style.color = '#e03131';
      toast.textContent = '✕ Network error — URL sahi hai? ' + err;
    })
    .finally(() => { btn.disabled = false; });
  };
</script>
</body>
</html>
